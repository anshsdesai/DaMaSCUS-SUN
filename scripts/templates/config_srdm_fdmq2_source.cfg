// DaMaSCUS-SUN - production SRDM source-side FDMq2 grid template
//
// Filled by scripts/run_srdm_source_grid.py.  The output contract for downstream
// daily-modulation studies is the differential SRDM source flux:
//
//   Differential_SRDM_Flux.txt: v [km/s], dPhi/dv [cm^-2 s^-1 (km/s)^-1]
//
// Downstream Verne and DaMaSCUS SRDMBeam workflows consume that flux directly.

// ID
	ID		=	"__ID__";

// Run mode
	run_mode = "Parameter point";

	sample_size 		=	__SAMPLE_SIZE__;
	interpolation_points	=	__INTERPOLATION_POINTS__;

// Options for "Parameter point"
	isoreflection_rings 		=	1;

// Options for "Parameter scan"
// These are still parsed by the code even if run_mode = "Parameter point".
	compute_halo_constraints	= 	false;
	perform_full_scan		=	false;

	constraints_certainty		=	0.95;

	constraints_mass_min		=	1.0e-5;	// in GeV
	constraints_mass_max		=	1.0e-2;	// in GeV
	constraints_masses		=	5;

	cross_section_min 		=	1.0e-42;	// in cm^2
	cross_section_max 		=	1.0e-33;	// in cm^2
	cross_sections			=	19;

// Simulation options
	use_medium_effects		= 	true;
	zeta				= 	0.0;

// Dark matter particle
	DM_mass		  		=	__DM_MASS_MEV__;	// in MeV
	DM_spin		  		=	0.5;
	DM_fraction			=	1.0;
	DM_light			=	true;

	DM_interaction			=	"Dark photon";

	DM_isospin_conserved		=	true;
	DM_relative_couplings		=	(1.0, 0.0);
	DM_cross_section_nucleon	=	1.0e-80;
	DM_cross_section_electron	=	__SIGMA_E_CM2__;	// in cm^2
	DM_form_factor			=	"Long-Range";
	DM_mediator_mass		=	0.0;

// Dark matter detection experiment
// The detector choice is not important for the SRDM source flux export itself,
// but the code still expects a valid detector configuration.
	DD_experiment	=	"Semiconductor";

	// Options for user-defined experiments ("Nuclear recoil", "Ionization", and "Semiconductor")
	// General
	DD_exposure 		=	300.0;	// in kg years
	DD_efficiency 		=	1.0;
	DD_observed_events 	=	0;
	DD_expected_background 	=	0.0;

	// Specific options for "Nuclear recoil"
	DD_targets_nuclear	=	(
					(4.0, 8),
					(1.0, 20),
					(1.0, 74)
					);
	DD_threshold_nuclear	=	0.1;	// in keV
	DD_Emax_nuclear		=	40.0;	// in keV
	DD_energy_resolution	=	0.0;	// in keV

	// Specific options for Ionization and Semiconductor
	DD_target_electron	=	"Si";
	DD_threshold_electron	=	1;

// Dark matter distribution
	DM_distribution     =	"SHM";
	DM_local_density    =	0.3;	// in GeV / cm^3

	// Options for "SHM"
	SHM_v0		=	238.0;				// in km/sec
	// Updated 2105.00599-style convention translated to the Sun frame:
	// local standard of rest 233 km/s + solar peculiar velocity (11.1, 12.2, 7.3) km/s
	SHM_vObserver	=	(11.1, 245.2, 7.3);	// in km/sec
	SHM_vEscape	=	544.0;				// in km/sec
