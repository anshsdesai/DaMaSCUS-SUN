// DaMaSCUS-SUN Fig. 22 validation flux point
//
// Target:
// - DPLM / ultralight dark photon / light mediator
// - m_chi = 10 keV = 0.01 MeV
// - sigma_e_bar = 1.0e-35 cm^2
// - angle-averaged SRDM flux at 1 AU
//
// Main DaMaSCUS output:
// results/<ID>/Differential_SRDM_Flux.txt

// ID
	ID			=	"fig22_DPLM_mchi_10keV_sigmae_1e-35_avg";

// Run mode
	run_mode		=	"Parameter point";
	sample_size		=	1000000;
	interpolation_points	=	1000;

// Options for "Parameter point"
	isoreflection_rings	=	1;

// Options for "Parameter scan"
// These are parsed even when run_mode = "Parameter point".
	compute_halo_constraints	=	false;
	perform_full_scan		=	false;
	constraints_certainty		=	0.95;
	constraints_mass_min		=	1.0e-5;	// in GeV
	constraints_mass_max		=	1.0e-2;	// in GeV
	constraints_masses		=	5;
	cross_section_min		=	1.0e-37;	// in cm^2
	cross_section_max		=	1.0e-32;	// in cm^2
	cross_sections			=	5;

// Simulation options
	use_medium_effects	=	true;
	zeta			=	0.0;	// qMin = zeta * mDM * vDM for long-range interactions

// Dark matter particle
	DM_mass			=	1.0e-2;	// in MeV
	DM_spin			=	0.5;
	DM_fraction		=	1.0;
	DM_light		=	true;

	DM_interaction			=	"Dark photon";
	DM_isospin_conserved		=	true;
	DM_relative_couplings		=	(1.0, 0.0);
	DM_cross_section_nucleon	=	1.0e-80;	// ignored by "Dark photon"; sigma_e below sets epsilon
	DM_cross_section_electron	=	1.0e-35;	// sigma_e_bar in cm^2
	DM_form_factor			=	"Long-Range";
	DM_mediator_mass		=	0.0;		// unused for "Long-Range"; m_A' = 0 internally

// Dark matter detection experiment
// Detector settings do not affect Differential_SRDM_Flux.txt, but the code
// requires a valid detector configuration. Silicon is selected for bookkeeping.
	DD_experiment	=	"Semiconductor";

	DD_exposure		=	300.0;	// in kg years
	DD_efficiency		=	1.0;
	DD_observed_events	=	0;
	DD_expected_background	=	0.0;

	DD_targets_nuclear	=	(
					(4.0, 8),
					(1.0, 20),
					(1.0, 74)
					);
	DD_threshold_nuclear	=	0.1;	// in keV
	DD_Emax_nuclear		=	40.0;	// in keV
	DD_energy_resolution	=	0.0;	// in keV

	DD_target_electron	=	"Si";
	DD_threshold_electron	=	1;

// Dark matter distribution
	DM_distribution		=	"SHM";
	DM_local_density	=	0.3;	// in GeV / cm^3

	SHM_v0			=	220.0;				// in km/sec
	SHM_vObserver		=	(11.1, 232.2, 7.3);	// Sun frame; README/default SHM convention
	SHM_vEscape		=	544.0;				// in km/sec
